name: Refresh LLM Timeline Data

on:
  # Run every Sunday at 09:00 UTC
  schedule:
    - cron: '0 9 * * 0'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run refresh script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh.js

      - name: Commit updated data.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit."
          else
            UPDATED=$(node -e "const d=require('./data.json'); console.log(d.meta.last_updated)")
            git commit -m "chore: refresh timeline data — ${UPDATED}"
            git push
          fi
